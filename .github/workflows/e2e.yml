name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  playwright:
    name: apps/console Playwright
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    # Set the same env apps/api reads from the root .env — PORT=4000
    # avoids a clash with anything the GitHub runner may bind to 3000.
    env:
      NODE_ENV: development
      PORT: "4000"
      KERNEL_PORT: "4100"
      DATABASE_URL: postgresql://erp:erp@localhost:5432/erp_dev
      REDIS_URL: redis://localhost:6379
      API_URL: http://localhost:4000
      CI: "true"
      FORCE_COLOR: "1"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp
          POSTGRES_DB: erp_dev
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U erp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @erp/console exec playwright install --with-deps chromium

      - name: Apply migrations
        run: pnpm db:migrate

      - name: Seed the reference tenant
        run: pnpm db:seed

      # Start api + kernel + worker in the background. dev:services
      # launches all three via turbo; pipe output to a log file so we
      # can surface it as an artifact if the tests fail.
      - name: Start apps/api, apps/kernel, apps/worker
        run: |
          pnpm dev:services > dev-services.log 2>&1 &
          echo "DEV_SERVICES_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for /readyz
        run: |
          for i in $(seq 1 60); do
            if curl -fs "$API_URL/readyz" > /dev/null; then
              echo "apps/api ready"; exit 0
            fi
            sleep 2
          done
          echo "apps/api never became ready" >&2
          tail -n 200 dev-services.log || true
          exit 1

      - name: Run Playwright
        run: pnpm --filter @erp/console test:e2e

      - name: Stop background services
        if: always()
        run: |
          if [ -n "$DEV_SERVICES_PID" ]; then
            kill "$DEV_SERVICES_PID" 2>/dev/null || true
          fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/console/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload dev services log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dev-services-log
          path: dev-services.log
          if-no-files-found: ignore
          retention-days: 7
