name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale PR runs but never cancel main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default to read-only token permissions; CI does not push artifacts upstream.
permissions:
  contents: read

jobs:
  verify:
    name: pnpm verify
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm verify
        run: pnpm verify
        env:
          CI: "true"
          FORCE_COLOR: "1"

      - name: Upload coverage (if produced)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: "**/coverage/"
          if-no-files-found: ignore
          retention-days: 7
