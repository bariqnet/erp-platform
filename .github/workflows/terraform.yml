name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  check:
    name: fmt + validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Format check (root module)
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

      - name: Validate (root module)
        working-directory: infra/terraform
        # -backend=false skips the S3 backend — the HCL is still
        # type-checked without needing to touch AWS state.
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Validate (bootstrap module)
        working-directory: infra/terraform/bootstrap
        run: |
          terraform init -backend=false -input=false
          terraform validate
